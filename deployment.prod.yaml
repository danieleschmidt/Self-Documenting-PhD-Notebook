# Kubernetes Production Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: phd-notebook-app
  namespace: research
  labels:
    app: phd-notebook
    version: v1.0.0
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 2
  selector:
    matchLabels:
      app: phd-notebook
  template:
    metadata:
      labels:
        app: phd-notebook
    spec:
      containers:
      - name: phd-notebook
        image: terragon/phd-notebook:latest
        ports:
        - containerPort: 8000
        env:
        - name: ENV
          value: "production"
        - name: LOG_LEVEL
          value: "INFO"
        - name: REDIS_URL
          value: "redis://redis-service:6379"
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: db-credentials
              key: url
        resources:
          limits:
            cpu: 2000m
            memory: 4Gi
          requests:
            cpu: 1000m
            memory: 2Gi
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /ready
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5
        volumeMounts:
        - name: data-volume
          mountPath: /app/data
        - name: config-volume
          mountPath: /app/config
      volumes:
      - name: data-volume
        persistentVolumeClaim:
          claimName: phd-data-pvc
      - name: config-volume
        configMap:
          name: phd-config
---
apiVersion: v1
kind: Service
metadata:
  name: phd-notebook-service
  namespace: research
spec:
  selector:
    app: phd-notebook
  ports:
  - protocol: TCP
    port: 80
    targetPort: 8000
  type: LoadBalancer
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: phd-config
  namespace: research
data:
  production.yaml: |
    app:
      name: "PhD Notebook"
      version: "1.0.0"
      environment: "production"
    
    security:
      encryption_enabled: true
      audit_logging: true
      access_control: strict
    
    performance:
      auto_scaling: true
      distributed_computing: true
      caching: true
      
    internationalization:
      default_locale: "en_US"
      supported_locales:
        - "en_US"
        - "es_ES" 
        - "fr_FR"
        - "de_DE"
        - "ja_JP"
        - "zh_CN"